<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한세대학교 2026-1 전임교원 시간표</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts: Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Supabase JS Library -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>
    <div class="app-container">
        <header>
            <div class="logo-wrapper">
                <div class="logo-container">
                    <div class="speech-bubble">안녕하세요.<br>저는 '한비(韓飛)'예요.<br>교수님들 시간표를<br>알려드릴께요.</div>
                    <img src="hanbi.gif" alt="한비 로고" class="logo">
                </div>
                <div class="qr-container">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=100x100&data=https://prof-time-table.vercel.app/"
                        alt="QR 코드" class="qr-code">
                    <span>Scan for Live URL</span>
                </div>
            </div>
            <h1>한세대학교 2026-1 전임교원 시간표</h1>
            <div class="committee-select-wrapper">
                <select id="committeeSelect">
                    <option value="">-- 위원회 선택 (전체보기) --</option>
                </select>
            </div>
            <div class="search-wrapper">
                <input type="text" id="nameSearch" placeholder="교수님 성함을 입력하세요" autocomplete="off">
                <div class="search-icon">🔍</div>
            </div>
            <p class="search-info">※ 한 칸 띄고 이름을 계속 입력하면,<br>여러 교수님이 검색됩니다.</p>
            <div id="adminControls" style="display: none; margin-top: 15px;">
                <a href="committee.html" class="upload-label"
                    style="background: #3b82f6; text-decoration: none; margin-left: 0px; width: 100%; display: block; text-align: center;">
                    ⚙️ 관리자 설정 (시간표 및 위원회)
                </a>
            </div>
            <button id="logoutBtn" class="logout-btn" style="display: none;">로그아웃</button>
        </header>

        <main>
            <div class="table-container">
                <table id="timetable">
                    <thead>
                        <tr>
                            <th class="period-th">시간</th>
                            <th>월</th>
                            <th>화</th>
                            <th>수</th>
                            <th>목</th>
                            <th>금</th>
                        </tr>
                    </thead>
                    <tbody id="timetableBody">
                        <!-- Content will be generated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>

        <footer>
            <p>All rights reserved Kim Young-Sam.</p>
        </footer>
    </div>

    <!-- Login Overlay -->
    <div id="loginOverlay" class="login-overlay">
        <div class="login-card">
            <div class="login-header">
                <img src="hanbi.gif" alt="Logo" class="login-logo">
                <h2>전임교원 시간표 조회</h2>
                <p>보안을 위해 로그인이 필요합니다.<br>권한이 있는 분만 로그인 하시기 바랍니다.</p>
            </div>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username">아이디</label>
                    <input type="text" id="username" placeholder="아이디를 입력하세요" required>
                </div>
                <div class="input-group">
                    <label for="password">비밀번호</label>
                    <input type="password" id="password" placeholder="비밀번호를 입력하세요" required>
                </div>
                <div id="loginError" class="login-error"></div>
                <button type="submit" class="login-submit">로그인</button>
            </form>
        </div>
    </div>

    <script>
        // Cache busting for data.js
        document.write('<script src="data.js?v=' + new Date().getTime() + '"><\/script>');
    </script>
    <script src="script.js"></script>
</body>

</html>
