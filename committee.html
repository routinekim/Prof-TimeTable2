<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>위원회 관리 - 한세대학교</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="committee.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <header>
            <div class="header-top">
                <a href="index.html" class="back-btn">← 시간표로 돌아가기</a>
            </div>
            <h1>👥 위원회 관리</h1>
            <p class="subtitle">교내 위원회별 교수진을 구성하고 관리합니다.</p>
            
            <div class="add-committee-wrapper">
                <input type="text" id="committeeNameInput" placeholder="새 위원회 이름을 입력하세요" autocomplete="off">
                <button id="addCommitteeBtn">위원회 추가</button>
            </div>

            <div class="admin-tools-section" style="margin-top: 20px; padding: 20px; background: #fff; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);">
                <h3 style="margin-top:0; font-size: 1rem; color: #1e293b; margin-bottom: 15px;">📊 시간표 및 위원회 데이터 관리</h3>
                <div style="display: flex; flex-direction: column; gap: 10px;">
                    <div style="display: flex; gap: 10px;">
                        <label for="excelUpload" class="upload-label" style="flex: 1; background: #10b981; color: white; padding: 12px; border-radius: 8px; text-align: center; cursor: pointer; font-weight: 500; display: block; margin:0;">
                            📁 엑셀 파일 선택 및 자동 업데이트
                            <input type="file" id="excelUpload" accept=".xlsx, .xls" style="display: none;">
                        </label>
                        <button id="forcePushCommitteesBtn" style="flex: 1; background: #3b82f6; color: white; border: none; padding: 12px; border-radius: 8px; font-size: 0.9rem; cursor: pointer; font-weight: 500;">
                            📤 위원회 데이터를 서버에 저장
                        </button>
                    </div>
                    <div id="syncStatus" style="text-align: center; font-size: 0.85rem; color: #0284c7; background: #f0f9ff; padding: 10px; border-radius: 8px; border: 1px solid #bae6fd;">
                        상태: 준비됨 (엑셀/위원회 데이터를 서버에 동기화할 수 있습니다)
                    </div>
                </div>
            </div>
        </header>

        <main>
            <div id="committeeList" class="committee-grid">
                <!-- 위원회 카드가 여기에 생성됩니다 -->
            </div>
        </main>

        <footer>
            <p>All rights reserved Kim Young-Sam.</p>
        </footer>
    </div>

    <script src="committee.js"></script>
</body>
</html>
